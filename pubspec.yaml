name: nsapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  calendar_view: ^1.4.0
  image_picker: ^1.2.1
  country_code_picker: ^3.4.1
  googleapis_auth: ^2.0.0
  google_fonts: ^8.0.1
  geocoding: ^4.0.0
  bloc_concurrency: ^0.2.5
  get_it: ^7.6.0

  dartz: ^0.10.1
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0
  flutter_stripe: ^12.2.0
  flutter_rating: ^2.0.2
  flutter_rating_bar: ^4.0.1
  font_awesome_flutter: ^10.6.0
  rating_dialog: ^2.0.4
  flutter_map_math: ^0.2.4
  geolocator: ^14.0.2
  vector_math: ^2.2.0
  google_maps_flutter: ^2.14.0
  google_maps_directions: ^0.0.4
  google_sign_in: ^7.2.0
  local_auth: ^3.0.0
  flutter_secure_storage: ^9.2.4
  internet_connection_checker_plus: ^2.9.1+2
  url_launcher: ^6.3.2
  google_maps_widget: ^1.0.6
  webview_flutter: ^4.13.1
  flutter_inappwebview: ^6.1.5
  flutter_web_browser: ^0.17.3
  cached_network_image: ^3.4.1
  keyboard_detection: ^0.8.1
  dio: ^5.9.0
  web_socket_channel: ^3.0.3
  web_socket: ^1.0.1
  flutter_otp_text_field: ^1.5.1+1
  intl: ^0.20.2
  uuid: ^4.5.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.0
  permission_handler: ^12.0.1
  device_info_plus: ^11.1.0
  http: ^1.6.0
  objective_c: ^9.3.0
  sign_in_with_apple: ^7.0.1
  hydrated_bloc: ^9.1.5
  sentry_flutter: ^8.2.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_staggered_animations: ^1.0.0
  animate_do: ^3.3.4
  infinite_scroll_pagination: ^4.0.0
  crypto: ^3.0.7
  go_router: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name:

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
    android: "true"
    ios: "true"
    remove_alpha_ios: true
    image_path: "assets/images/logo2.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/
    - assets/.env.dev
    - assets/.env.stage
    - assets/.env.prod
    - assets/certs/
  fonts:
    - family: FuturaPT
      fonts:
        - asset: assets/fonts/FuturaPT-Light.ttf
          weight: 300
        - asset: assets/fonts/FuturaPT-Book.ttf
          weight: 400
        - asset: assets/fonts/FuturaPT-Medium.ttf
          weight: 500
        - asset: assets/fonts/FuturaPT-Bold.ttf
          weight: 700
